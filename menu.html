<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Menu SakuP3K</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
    }

    .header {
      background: linear-gradient(135deg, #1e7f4f, #3bb273);
      color: white;
      padding: 25px;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    .header h2 {
      margin: 5px 0;
      font-size: 26px;
    }

    .menu {
      padding: 20px;
    }

    .menu h3 {
      margin-bottom: 15px;
      color: #555;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card span {
      font-size: 30px;
    }

    .card p {
      margin-top: 10px;
      font-weight: bold;
    }

    .emergency {
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      background: linear-gradient(135deg, #ff7a18, #ffb347);
      color: white;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      margin: 15px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="header">
    <p>Halo, selamat datang </p>
    <h2 id="namaUser"></h2>
  </div>

  <div class="menu">
    <h3>Menu Utama</h3>

    <div class="grid">
      <div class="card" onclick="window.location.href='materi.html'">
        <span></span>
        <p>Materi</p>
      </div>

      <div class="card" onclick="window.location.href='kuis.html'">
            <span></span>
            <p>Kuis</p>
       </div>

      <div class="card" onclick="window.location.href='profil.html'">
        <span></span>
        <p>Profil</p>
      </div>
    </div>
  </div>

  <div class="emergency">
    <h3>Darurat? Hubungi 119!</h3>
    <p>Segera hubungi tenaga medis setelah pertolongan pertama.</p>
  </div>

  <div class="footer">
    PGSD Project • 2026
  </div>

  <script>
    const nama = localStorage.getItem("namaUser");
    document.getElementById("namaUser").innerText = nama || "User";
    
    function toggleMusic( ){
  let music = document.getElementById("bgMusic");
  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}
document.body.addEventListener("click", function () {
  let music = document.getElementById("bgMusic");
  music.volume = 0.3;
  music.play();

  // supaya cuma jalan sekali
  document.body.onclick = null;
});
  </script>
<audio id="bgMusic" loop>
  <source src="backsound.mp3" type="audio/mp3">
</audio>
</body>
</html>
